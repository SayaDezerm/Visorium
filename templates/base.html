{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Movie Catalog{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/image.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/nav-bar.css' %}">
    <link rel="stylesheet" href="{% static 'css/modal.css' %}">
    <link rel="stylesheet" href="{% static 'css/ai_assistant.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

<!-- AI ASSISTANT WIDGET -->
<div class="ai-widget">

    <!-- Buton trigger -->
    <button class="ai-trigger" id="aiTrigger" title="Întreabă AI despre filme">
        <svg class="ai-icon-open" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
            <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <svg class="ai-icon-close" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span class="ai-pulse"></span>
    </button>

    <!-- Chat panel -->
    <div class="ai-panel" id="aiPanel">
        <div class="ai-panel-header">
            <div class="ai-header-info">
                <div class="ai-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                </div>
                <div>
                    <p class="ai-name">VISo</p>
                    <p class="ai-status">Specialist în filme</p>
                </div>
            </div>
            <button class="ai-panel-close" id="aiPanelClose">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="ai-messages" id="aiMessages">
            <div class="ai-msg ai-msg--bot">
                <div class="ai-msg-bubble">
                    👋 Salut! Sunt <strong>VISo</strong>. Întreabă-mă orice despre filmele din catalog sau despre cinema în general!
                </div>
            </div>
        </div>

        <div class="ai-input-wrap">
            <input type="text" id="aiInput" placeholder="Întreabă despre un film..." maxlength="300">
            <button id="aiSend">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

</div>

<!-- MOVIE MODAL -->
<div class="modal-overlay" id="movieModal">
    <div class="modal">

        <button class="modal-close" id="modalClose">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>

        <!-- Trailer / Poster -->
        <div class="modal-media" id="modalMedia"></div>

        <!-- Info -->
        <div class="modal-body">
            <div class="modal-meta">
                <span class="modal-genre" id="modalGenre"></span>
                <span class="modal-year" id="modalYear"></span>
                <span class="modal-duration" id="modalDuration">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span id="modalDurationText"></span>
                </span>
            </div>

            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-description" id="modalDescription"></p>

            <div class="modal-actions">
                <button class="modal-btn-fav" id="modalFavBtn" style="display:none">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    <span>Adaugă la favorite</span>
                </button>
            </div>
        </div>

    </div>
</div>

<script src="{% static 'js/main.js' %}"></script>
<script src="{% static 'js/ai_assistant.js' %}"></script>

</body>
</html>
